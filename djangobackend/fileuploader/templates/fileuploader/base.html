{% load static %}
<!doctype html>
<html lang="en">
  <head>
    {% block title %}{% endblock %}
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <link
      rel="icon"
      type="image/x-icon"
      href="{% static 'favicons/favicon.ico' %}"
    />
    <link href="{% static 'css/style.css' %}" rel="stylesheet" />
    {% block extrahead %}{% endblock %}
  </head>

  <body class="fu-page">
    {% if user.is_authenticated %}
    <div
      class="flex items-center justify-between border-b border-fu-border bg-fu-panel/70 px-6 py-4 backdrop-blur-sm"
    >
      <a class="font-semibold" href="{% url 'fileuploader:list_files' %}"
        >File Uploader</a
      >
      <div class="flex items-center gap-4 text-sm font-medium">
        <a
          class="text-fu-muted transition-colors hover:text-fu-foreground"
          href="{% url 'fileuploader:password_change' %}"
          >Change Password</a
        >
        <a
          class="text-fu-muted transition-colors hover:text-fu-foreground"
          href="{% url 'fileuploader:logout' %}"
          >Logout</a
        >
      </div>
    </div>
    {% endif %}
    <div class="flex w-full justify-center px-4 py-10">
      {% block body %}{% endblock %}
    </div>
    {% block extrascript %}{% endblock %}
  </body>
</html>
