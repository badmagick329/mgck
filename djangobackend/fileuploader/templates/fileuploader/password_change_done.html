{% extends "fileuploader/base.html" %}
{% block title %}
<title>Password Updated</title>
{% endblock %}
{% block body %}
<div class="flex w-full max-w-lg justify-center">
  <div class="fu-card w-full max-w-lg">
    <div class="flex flex-col gap-3">
      <h1 class="text-4xl font-bold tracking-tight text-fu-foreground">
        Password Updated
      </h1>
      <p class="text-fu-muted">
        Your Django file uploader password has been changed successfully.
      </p>
    </div>
    <div class="flex justify-end">
      <a
        class="fu-button fu-button-primary"
        href="{% url 'fileuploader:list_files' %}"
        >Back to Files</a
      >
    </div>
  </div>
</div>
{% endblock %}
